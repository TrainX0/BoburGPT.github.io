<!doctype html>
<html lang="ru" data-lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="BoburGPT - AI Video Studio">
  <title>BoburGPT - AI Video Studio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171100;
      --bg-soft: #231a03;
      --panel: rgba(42, 31, 5, 0.86);
      --panel-2: rgba(255, 214, 74, 0.1);
      --text: #fff8d4;
      --muted: #dcc36b;
      --line: rgba(255, 221, 91, 0.22);
      --gold: #ffd23f;
      --gold-2: #fff08a;
      --gold-3: #c98b00;
      --ink: #120d00;
      --shadow: rgba(0, 0, 0, 0.34);
      --max: 1160px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 210, 63, 0.24), transparent 28%),
        radial-gradient(circle at 82% 28%, rgba(255, 240, 138, 0.16), transparent 30%),
        linear-gradient(180deg, var(--bg), #0e0a00 72%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 54px 54px;
      opacity: 0.19;
      mask-image: linear-gradient(to bottom, black, transparent 86%);
      transform: translate3d(calc(var(--mx, 0) * -7px), calc(var(--my, 0) * -7px), 0);
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    svg { display: block; max-width: 100%; }

    #scene3d {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      opacity: 0.62;
    }

    .site-header,
    main,
    footer {
      position: relative;
      z-index: 2;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--line);
      background: rgba(23, 17, 0, 0.82);
      backdrop-filter: blur(18px);
    }

    .header-inner,
    .wrap,
    .footer-inner {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .header-inner {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand svg { width: 38px; height: 38px; }

    .nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav a {
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--muted);
      transition: color 0.2s ease, background 0.2s ease;
    }

    .nav a:hover { color: var(--text); background: var(--panel-2); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lang-switcher {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .lang-switcher button {
      min-width: 38px;
      height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
      transition: transform 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .lang-switcher button.active,
    .lang-switcher button:hover {
      color: var(--text);
      background: rgba(255, 210, 63, 0.2);
      transform: translateY(-1px);
    }

    .menu-button {
      display: none;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
    }

    .pill-button,
    .ghost-button,
    .mini-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      border: 1px solid transparent;
      font-weight: 900;
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .pill-button {
      color: var(--ink);
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      box-shadow: 0 18px 44px rgba(255, 210, 63, 0.16);
    }

    .ghost-button,
    .mini-button {
      color: var(--text);
      background: var(--panel-2);
      border-color: var(--line);
    }

    .pill-button:hover,
    .ghost-button:hover,
    .mini-button:hover {
      transform: translateY(-3px);
      border-color: var(--gold);
    }

    .mini-button { min-height: 36px; padding: 0 12px; font-size: 0.88rem; }

    .hero {
      min-height: calc(88svh - 70px);
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(320px, 0.9fr);
      align-items: center;
      gap: 48px;
      padding: 66px 0 42px;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      max-width: 760px;
      margin-bottom: 18px;
      font-size: clamp(4rem, 9vw, 8.2rem);
      line-height: 0.86;
      text-transform: uppercase;
      letter-spacing: 0;
      font-family: Georgia, "Times New Roman", serif;
    }

    h1 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 248, 212, 0.76);
    }

    .lead {
      max-width: 700px;
      color: var(--muted);
      font-size: clamp(1.08rem, 1.7vw, 1.32rem);
      line-height: 1.75;
      margin-bottom: 28px;
    }

    .hero-actions,
    .contact-actions,
    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      max-width: 620px;
      margin-top: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--line);
      overflow: hidden;
    }

    .metric { padding: 18px; background: rgba(23, 17, 0, 0.78); }
    .metric strong { display: block; margin-bottom: 6px; font-size: 2rem; color: var(--gold-2); }
    .metric span { color: var(--muted); font-size: 0.9rem; }

    .hero-visual {
      min-height: 500px;
      display: grid;
      place-items: center;
      perspective: 1100px;
    }

    .model-stack {
      position: relative;
      width: min(100%, 500px);
      aspect-ratio: 1;
      transform-style: preserve-3d;
      animation: floatStage 7s ease-in-out infinite;
    }

    .render-tower {
      position: absolute;
      inset: 15% 22% 18%;
      transform-style: preserve-3d;
      transform: rotateX(62deg) rotateZ(-32deg);
    }

    .slab {
      position: absolute;
      inset: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 210, 63, 0.38), transparent 44%),
        linear-gradient(315deg, rgba(255, 240, 138, 0.28), transparent 42%),
        rgba(42, 31, 5, 0.86);
      box-shadow: 0 28px 70px var(--shadow);
      transform: translateZ(var(--z));
      animation: slabLift 5.5s ease-in-out infinite;
      animation-delay: var(--d);
    }

    .orbit-ring {
      position: absolute;
      inset: 8%;
      border: 1px solid rgba(255, 210, 63, 0.42);
      border-radius: 50%;
      animation: orbitSpin 12s linear infinite;
      transform-style: preserve-3d;
    }

    .orbit-ring:nth-child(2) {
      inset: 14%;
      border-color: rgba(255, 240, 138, 0.34);
      animation-duration: 9s;
      animation-direction: reverse;
    }

    .orbit-node {
      position: absolute;
      width: 16px;
      height: 16px;
      left: calc(50% - 8px);
      top: -8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 24px rgba(255, 210, 63, 0.8);
    }

    .mini-model {
      position: absolute;
      width: clamp(34px, 5vw, 58px);
      aspect-ratio: 1;
      left: var(--x);
      top: var(--y);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, var(--gold), rgba(255, 240, 138, 0.3));
      box-shadow: 0 16px 32px var(--shadow);
      animation: miniFloat 7s ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .mini-model::before,
    .mini-model::after {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px solid rgba(255, 248, 212, 0.4);
      border-radius: inherit;
      transform: translateZ(18px) rotate(16deg);
    }

    .visual-label,
    .video-card {
      position: absolute;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 17, 0, 0.78);
      backdrop-filter: blur(14px);
      box-shadow: 0 22px 60px var(--shadow);
    }

    .visual-label {
      left: 0;
      top: 10%;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 0.86rem;
      animation: cardDrift 6.8s ease-in-out infinite reverse;
    }

    .video-card {
      right: 4%;
      bottom: 12%;
      width: 184px;
      padding: 14px;
      animation: cardDrift 6s ease-in-out infinite;
    }

    .thumb {
      height: 58px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--gold-3), var(--gold), var(--gold-2));
      margin-bottom: 12px;
      position: relative;
    }

    .thumb::after {
      content: "";
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-35%);
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 17px solid var(--ink);
    }

    .line {
      height: 7px;
      border-radius: 999px;
      background: rgba(255, 210, 63, 0.18);
      margin-bottom: 8px;
    }

    .motion-strip {
      border-block: 1px solid var(--line);
      overflow: hidden;
      background: rgba(42, 31, 5, 0.64);
    }

    .ticker {
      display: flex;
      width: max-content;
      animation: ticker 32s linear infinite;
    }

    .ticker span {
      padding: 15px 24px;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    section { padding: 88px 0; }

    .section-head {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(260px, 0.52fr);
      gap: 30px;
      align-items: end;
      margin-bottom: 34px;
    }

    .kicker {
      margin-bottom: 10px;
      color: var(--gold);
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.14em;
    }

    h2 {
      margin-bottom: 0;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      line-height: 0.96;
      text-transform: uppercase;
      letter-spacing: 0;
      font-family: Georgia, "Times New Roman", serif;
    }

    .section-copy,
    .card p,
    .why-card p,
    .step p,
    .contact-panel p {
      color: var(--muted);
      line-height: 1.7;
    }

    .services-grid,
    .steps,
    .why-grid {
      display: grid;
      gap: 16px;
    }

    .services-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .steps { grid-template-columns: repeat(3, minmax(0, 1fr)); counter-reset: step; }
    .why-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card,
    .step,
    .why-card,
    .calculator,
    .contact-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 70px var(--shadow);
      backdrop-filter: blur(16px);
    }

    .card {
      min-height: 360px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      overflow: hidden;
      transition: transform 0.22s ease, border-color 0.22s ease;
    }

    .card:hover,
    .step:hover,
    .why-card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
    }

    .service-art {
      min-height: 140px;
      display: grid;
      place-items: center;
      margin: -6px -6px 18px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 210, 63, 0.22), transparent),
        var(--panel-2);
      overflow: hidden;
    }

    .service-art svg {
      width: min(84%, 230px);
      height: 120px;
      filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.22));
      animation: svgHover 5s ease-in-out infinite;
    }

    .card h3,
    .step h3,
    .why-card h3 { margin-bottom: 10px; font-size: 1.22rem; }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
    }

    .price { color: var(--gold-2); font-weight: 900; }

    .process {
      background: linear-gradient(180deg, transparent, rgba(35, 26, 3, 0.72), transparent);
    }

    .step {
      padding: 26px;
      overflow: hidden;
      transition: transform 0.22s ease, border-color 0.22s ease;
    }

    .step::before {
      counter-increment: step;
      content: "0" counter(step);
      display: block;
      margin-bottom: 26px;
      color: var(--gold);
      font-weight: 900;
      letter-spacing: 0.12em;
    }

    .step svg { width: 100%; height: 140px; margin-bottom: 20px; }

    .pricing-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(320px, 0.68fr);
      gap: 18px;
      align-items: start;
    }

    .price-list { display: grid; gap: 10px; }

    .price-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .price-row span { color: var(--muted); }
    .price-row b { color: var(--gold-2); white-space: nowrap; }

    .calculator { padding: 22px; position: sticky; top: 94px; }

    .control-label {
      display: block;
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .segmented button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
    }

    .segmented button.active {
      border-color: var(--gold);
      background: rgba(255, 210, 63, 0.16);
    }

    .estimate {
      margin: 22px 0;
      padding: 20px;
      border-radius: 8px;
      background: rgba(255, 210, 63, 0.12);
    }

    .estimate span { display: block; color: var(--muted); margin-bottom: 6px; }
    .estimate strong { color: var(--gold-2); font-size: clamp(1.8rem, 4vw, 2.6rem); }

    .why-card { padding: 22px; min-height: 220px; transition: transform 0.22s ease, border-color 0.22s ease; }

    .why-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      margin-bottom: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--gold);
    }

    .why-icon svg { width: 28px; height: 28px; }

    .contact-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.54fr);
      gap: 28px;
      align-items: center;
      padding: 32px;
    }

    .contact-art { min-height: 300px; display: grid; place-items: center; }
    .contact-art svg { width: min(100%, 360px); animation: svgHover 5s ease-in-out infinite; }

    footer {
      border-top: 1px solid var(--line);
      padding: 34px 0 48px;
      color: var(--muted);
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .welcome-backdrop,
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(10, 7, 0, 0.74);
      backdrop-filter: blur(18px);
    }

    .welcome-backdrop.open,
    .modal-backdrop.open { display: grid; animation: fadeIn 0.2s ease; }

    .welcome-card,
    .modal {
      width: min(100%, 560px);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(22px, 4vw, 34px);
      background: rgba(35, 26, 3, 0.96);
      box-shadow: 0 34px 110px var(--shadow);
    }

    .welcome-card h2,
    .modal h3 {
      margin-bottom: 12px;
      font-size: clamp(2rem, 6vw, 3.6rem);
    }

    .welcome-card p,
    .modal p { color: var(--muted); line-height: 1.65; }

    .welcome-label {
      display: block;
      margin: 24px 0 10px;
      color: var(--muted);
      font-weight: 900;
    }

    .welcome-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .welcome-option {
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font-weight: 900;
    }

    .welcome-option.active,
    .welcome-option:hover {
      border-color: var(--gold);
      background: rgba(255, 210, 63, 0.2);
    }

    .welcome-start { width: 100%; margin-top: 26px; }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .reveal.visible { opacity: 1; transform: translateY(0); }

    @keyframes floatStage {
      0%, 100% { transform: translateY(0) rotateX(0deg); }
      50% { transform: translateY(-16px) rotateX(3deg); }
    }
    @keyframes slabLift { 0%, 100% { translate: 0 0; } 50% { translate: 0 -16px; } }
    @keyframes orbitSpin { to { transform: rotateX(68deg) rotateZ(360deg); } }
    @keyframes miniFloat {
      0%, 100% { transform: translate3d(0, 0, 0) rotateX(58deg) rotateZ(0deg); }
      50% { transform: translate3d(0, -16px, 40px) rotateX(58deg) rotateZ(18deg); }
    }
    @keyframes cardDrift {
      0%, 100% { transform: translate3d(0, 0, 60px); }
      50% { transform: translate3d(-12px, -16px, 90px); }
    }
    @keyframes ticker { to { transform: translateX(-50%); } }
    @keyframes svgHover {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-1deg); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 980px) {
      .menu-button { display: grid; }
      .nav {
        position: fixed;
        top: 70px;
        left: 16px;
        right: 16px;
        display: grid;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg-soft);
        box-shadow: 0 30px 90px var(--shadow);
        opacity: 0;
        transform: translateY(-12px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }
      .nav.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
      .nav a { padding: 13px 12px; }
      .hero,
      .section-head,
      .pricing-layout,
      .contact-panel { grid-template-columns: 1fr; }
      .hero { min-height: auto; padding-top: 52px; }
      .hero-visual { min-height: 420px; order: -1; }
      .services-grid,
      .steps { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .why-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .calculator { position: relative; top: 0; }
    }

    @media (max-width: 640px) {
      .header-inner { width: min(var(--max), calc(100% - 20px)); gap: 8px; }
      .brand { gap: 8px; font-size: 0.96rem; }
      .brand svg { width: 32px; height: 32px; }
      .header-actions .pill-button { display: none; }
      .lang-switcher { gap: 2px; padding: 3px; }
      .lang-switcher button { min-width: 32px; height: 32px; font-size: 0.78rem; }
      .menu-button { width: 38px; height: 38px; }
      h1 {
        font-size: clamp(3rem, 15vw, 4.4rem);
        line-height: 0.92;
      }
      h2 {
        font-size: clamp(2rem, 10vw, 3.2rem);
        line-height: 1;
      }
      .lead {
        font-size: 1rem;
        line-height: 1.65;
      }
      .eyebrow,
      .ticker span {
        letter-spacing: 0.08em;
      }
      .nav a,
      .pill-button,
      .ghost-button,
      .mini-button,
      .lang-switcher button {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }
      .metrics,
      .services-grid,
      .steps,
      .why-grid { grid-template-columns: 1fr; }
      .hero-visual { min-height: 300px; }
      .model-stack { width: min(100%, 360px); }
      .video-card { right: 0; bottom: 4%; width: 140px; }
      .visual-label { left: 2%; top: 3%; }
      .welcome-options,
      .segmented { grid-template-columns: 1fr; }

    const basePrices = { ad: 50000, product: 90000, social: 50000, edu: 130000 };
    const durationFactor = { short: 1, medium: 1.45, long: 2.25, premium: 4 };
    let selectedKind = "ad";
    let selectedDuration = "short";
    let currentLang = localStorage.getItem("boburgpt-lang") || "ru";
    let animationPaused = false;

    const money = value => `${Math.round(value / 1000) * 1000}`.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    const t = () => dict[currentLang];

    function setText() {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        if (t()[key]) el.textContent = t()[key];
      });
      document.getElementById("welcomeTitle").textContent = t().welcomeTitle;
      document.getElementById("welcomeText").textContent = t().welcomeText;
      document.getElementById("languageLabel").textContent = t().languageLabel;
      document.getElementById("welcomeStart").textContent = t().enter;
      document.documentElement.lang = currentLang;
      document.documentElement.dataset.lang = currentLang;
    }

    function setActiveLang() {
      document.querySelectorAll("[data-lang]").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === currentLang));
    }

    function renderNav() {
      nav.innerHTML = t().nav.map(([href, label]) => `<a href="${href}">${label}</a>`).join("");
    }

    function renderMetrics() {
      document.getElementById("metrics").innerHTML = t().metrics.map(([num, label]) => `<div class="metric"><strong>${num}</strong><span>${label}</span></div>`).join("");
    }

    function renderTicker() {
      const items = [...t().ticker, ...t().ticker];
      document.getElementById("ticker").innerHTML = items.map(item => `<span>${item}</span>`).join("");
    }

    function renderServices() {
      document.getElementById("servicesGrid").innerHTML = t().services.map(([key, name, desc, price]) => `
        <article class="card reveal">
          <div>
            <div class="service-art">${art[key]}</div>
            <h3>${name}</h3>
            <p>${desc}</p>
          </div>
          <div class="card-bottom">
            <span class="price">${price}</span>
            <button class="mini-button" type="button" data-order-key="${key}">${t().order}</button>
          </div>
        </article>
      `).join("");
    }

    function renderSteps() {
      document.getElementById("stepsGrid").innerHTML = t().steps.map(([key, title, desc]) => `
        <article class="step reveal">${art[key]}<h3>${title}</h3><p>${desc}</p></article>
      `).join("");
    }

    function renderPricing() {
      document.getElementById("priceList").innerHTML = t().prices.map(([duration, label, price]) => `
        <div class="price-row"><div><strong>${duration}</strong><span>${label}</span></div><b>${price}</b></div>
      `).join("");
      document.getElementById("serviceControl").innerHTML = t().kinds.map(([key, label]) => `<button type="button" data-kind="${key}">${label}</button>`).join("");
      document.getElementById("durationControl").innerHTML = t().durations.map(([key, label]) => `<button type="button" data-duration="${key}">${label}</button>`).join("");
      document.querySelector(`[data-kind="${selectedKind}"]`)?.classList.add("active");
      document.querySelector(`[data-duration="${selectedDuration}"]`)?.classList.add("active");
      updateEstimate();
    }

    function renderWhy() {
      const icons = [
        '<path d="M5 13h6L9 21l10-13h-6l2-5L5 13Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>',
        '<path d="M4 7h16v10H4V7Z" stroke="currentColor" stroke-width="1.8"/><path d="M9 10.5 14 12l-5 1.5v-3Z" fill="currentColor"/>',
        '<path d="M12 3 20 7.5v9L12 21l-8-4.5v-9L12 3Z" stroke="currentColor" stroke-width="1.8"/><path d="M12 8v8M8 10.2l8 4.6M16 10.2l-8 4.6" stroke="currentColor" stroke-width="1.5"/>',
        '<path d="M5 6h14M5 12h14M5 18h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8 4v4M16 10v4M11 16v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
      ];
      document.getElementById("whyGrid").innerHTML = t().why.map(([title, desc], i) => `
        <article class="why-card reveal"><span class="why-icon"><svg viewBox="0 0 24 24" fill="none">${icons[i]}</svg></span><h3>${title}</h3><p>${desc}</p></article>
      `).join("");
    }

    function renderAll() {
      setText();
      setActiveLang();
      renderNav();
      renderMetrics();
      renderTicker();
      renderServices();
      renderSteps();
      renderPricing();
      renderWhy();
      document.getElementById("contactArt").innerHTML = art.contact;
      bindDynamicEvents();
      revealFresh();
    }

    function revealFresh() {
      document.querySelectorAll(".reveal").forEach(el => {
        if (!el.dataset.observed) {
          observer.observe(el);
          el.dataset.observed = "1";
        }
      });
    }

    function serviceName(key) {
      return t().services.find(item => item[0] === key)?.[1] || key;
    }

    function openOrder(keyOrText) {
      const name = serviceName(keyOrText);
      const message = t().modalMessage.replace("{service}", name);
      document.getElementById("modalTitle").textContent = t().modalTitle;
      modalText.textContent = `${t().modalPrefix}: ${name}? ${t().modalHelp}`;
      modalTelegram.textContent = t().modalYes;
      modalClose.textContent = t().modalNo;
      modalTelegram.href = `https://t.me/${tgUser}?text=${encodeURIComponent(message)}`;
      modal.classList.add("open");
    }

    function updateEstimate() {
      const value = basePrices[selectedKind] * durationFactor[selectedDuration];
      estimateValue.textContent = `${money(value)} ${t().sum}`;
    }

    function bindDynamicEvents() {
      document.querySelectorAll("[data-order-key]").forEach(button => {
        button.onclick = () => openOrder(button.dataset.orderKey);
      });
      document.getElementById("serviceControl").querySelectorAll("button").forEach(button => {
        button.onclick = () => {
          selectedKind = button.dataset.kind;
          renderPricing();
        };
      });
      document.getElementById("durationControl").querySelectorAll("button").forEach(button => {
        button.onclick = () => {
          selectedDuration = button.dataset.duration;
          renderPricing();
        };
      });
      document.getElementById("estimateOrder").onclick = () => openOrder(`${serviceName(selectedKind)}, ${t().budget} ${estimateValue.textContent}`);
    }

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add("visible");
      });
    }, { threshold: 0.14 });

    document.addEventListener("click", event => {
      const langBtn = event.target.closest("[data-lang]");
      if (langBtn) {
        currentLang = langBtn.dataset.lang;
        localStorage.setItem("boburgpt-lang", currentLang);
        renderAll();
      }
      if (event.target.closest("#nav a")) nav.classList.remove("open");
    });

    menuToggle.addEventListener("click", () => nav.classList.toggle("open"));
    welcomeStart.addEventListener("click", () => welcomeModal.classList.remove("open"));
    modalClose.addEventListener("click", () => modal.classList.remove("open"));
    modalTelegram.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", event => {
      if (event.target === modal) modal.classList.remove("open");
    });

    document.addEventListener("pointermove", event => {
      const x = event.clientX / window.innerWidth - 0.5;
      const y = event.clientY / window.innerHeight - 0.5;
      root.style.setProperty("--mx", x.toFixed(3));
      root.style.setProperty("--my", y.toFixed(3));
    });

    renderAll();
    welcomeModal.classList.add("open");

    const canvas = document.getElementById("scene3d");
    const ctx = canvas.getContext("2d");
    let width = 0;
    let height = 0;
    let dpr = 1;
    let pointerX = 0;
    let pointerY = 0;

    function resizeCanvas() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.25);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("pointermove", event => {
      pointerX = event.clientX / width - 0.5;
      pointerY = event.clientY / height - 0.5;
    });
    document.addEventListener("visibilitychange", () => {
      animationPaused = document.hidden;
      if (!animationPaused) requestAnimationFrame(renderScene);
    });

    function rotate(point, ax, ay, az) {
      let [x, y, z] = point;
      let c = Math.cos(ax), s = Math.sin(ax);
      let ny = y * c - z * s;
      let nz = y * s + z * c;
      y = ny; z = nz;
      c = Math.cos(ay); s = Math.sin(ay);
      let nx = x * c + z * s;
      nz = -x * s + z * c;
      x = nx; z = nz;
      c = Math.cos(az); s = Math.sin(az);
      nx = x * c - y * s;
      ny = x * s + y * c;
      return [nx, ny, z];
    }

    function project([x, y, z]) {
      const depth = 720;
      const scale = depth / (depth + z);
      return { x: width * 0.5 + x * scale, y: height * 0.5 + y * scale, scale, z };
    }

    function drawCube(cx, cy, cz, size, rx, ry, rz) {
      const s = size / 2;
      const colors = ["rgba(255,210,63,.18)", "rgba(255,240,138,.2)", "rgba(201,139,0,.16)", "rgba(255,210,63,.14)", "rgba(255,240,138,.14)", "rgba(255,248,212,.09)"];
      const v = [[-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],[-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]].map(p => {
        const r = rotate(p, rx, ry, rz);
        return [r[0] + cx, r[1] + cy, r[2] + cz];
      });
      const faces = [[0,1,2,3,0],[4,5,6,7,1],[0,1,5,4,2],[2,3,7,6,3],[1,2,6,5,4],[0,3,7,4,5]].sort((a,b) => {
        const za = a.slice(0,4).reduce((sum,i) => sum + v[i][2], 0);
        const zb = b.slice(0,4).reduce((sum,i) => sum + v[i][2], 0);
        return za - zb;
      });
      faces.forEach(face => {
        const pts = face.slice(0,4).map(i => project(v[i]));
        ctx.beginPath();
        pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
        ctx.closePath();
        ctx.fillStyle = colors[face[4]];
        ctx.strokeStyle = "rgba(255,221,91,.2)";
        ctx.lineWidth = 1;
        ctx.fill();
        ctx.stroke();
      });
    }

    function drawOrbit(time, radius, color, tilt) {
      const segments = width < 700 ? 30 : 42;
      const pts = [];
      for (let i = 0; i < segments; i++) {
        const a = i / segments * Math.PI * 2;
        const p = rotate([Math.cos(a) * radius, Math.sin(a) * radius * 0.34, Math.sin(a) * radius], tilt, time * 0.28, 0);
        pts.push(project([p[0], p[1] - 30, p[2] + 40]));
      }
      ctx.beginPath();
      pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.closePath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    function drawLines(time) {
      ctx.save();
      ctx.globalAlpha = 0.42;
      const lines = width < 700 ? 6 : 10;
      for (let i = 0; i < lines; i++) {
        const y = (i / lines) * height + Math.sin(time * 0.7 + i) * 14;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y + Math.sin(time + i) * 20);
        ctx.strokeStyle = i % 3 === 0 ? "rgba(255,210,63,.14)" : "rgba(255,221,91,.055)";
        ctx.stroke();
      }
      ctx.restore();
    }

    let lastFrame = 0;
    function renderScene(now) {
      if (animationPaused) return;
      if (now - lastFrame < 33) {
        requestAnimationFrame(renderScene);
        return;
      }
      lastFrame = now;
      const time = now * 0.001;
      ctx.clearRect(0, 0, width, height);
      drawLines(time);
      const shiftX = pointerX * 70;
      const shiftY = pointerY * 55;
      drawOrbit(time, Math.min(width, height) * 0.24, "rgba(255,210,63,.42)", 0.8 + pointerY * 0.4);
      drawOrbit(time + 2, Math.min(width, height) * 0.18, "rgba(255,240,138,.34)", -0.7 + pointerX * 0.4);
      drawCube(shiftX, shiftY - 32, 0, Math.min(width, height) * 0.18, time * 0.28 + pointerY, time * 0.42 + pointerX, time * 0.14);
      drawCube(width * 0.28, -height * 0.13, 80, 82, time * 0.18, time * 0.35, -0.25);
      requestAnimationFrame(renderScene);
    }

    resizeCanvas();
    requestAnimationFrame(renderScene);
  </script>
